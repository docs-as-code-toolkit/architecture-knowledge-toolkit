name: Validate

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # All tasks run through build.sh in the docs-toolbox container image, so
      # CI uses the same toolchain (Ruby, Node.js, Asciidoctor) as local runs.
      # The GitHub runner provides Docker, so build.sh executes in-container.
      - name: Validate metamodel
        run: ./build.sh validate

      - name: Run tests
        run: ./build.sh test

      - name: Check generated agent adapters
        run: ./build.sh check-adapters

      - name: Verify generated documentation is current
        run: |
          ./build.sh generate
          if [ -n "$(git status --porcelain)" ]; then
            git status --short
            git diff --exit-code
            exit 1
          fi
