name: Publish Architecture Docs

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"

      - name: Install Asciidoctor
        run: gem install asciidoctor

      - name: Validate metamodel
        run: ruby scripts/validate-metamodel.rb

      - name: Run validator tests
        run: ruby -Itest test/validate_metamodel_test.rb

      - name: Check generated agent adapters
        run: node scripts/check-agent-adapters.js

      - name: Generate derived documentation fragments
        run: ruby scripts/validate-metamodel.rb --generate

      - name: Build static HTML
        run: |
          mkdir -p public
          asciidoctor \
            -a skip-front-matter \
            -a toc=left \
            -a sectanchors \
            -a icons=font \
            -D public \
            -o index.html \
            src/docs/doc-001-arc42.adoc

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
